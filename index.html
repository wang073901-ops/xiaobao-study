<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7fbf7" />
    <title>智能学习助手</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="app/styles.css?v=20260708-1648" />
  </head>
  <body>
    <div id="app" class="shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark">学</div>
          <div>
            <strong>智能学习助手</strong>
            <span>英语提分闭环</span>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-route="home">今日</button>
          <button class="nav-item" data-route="english">英语</button>
          <button class="nav-item" data-route="mistakes">巩固</button>
          <button class="nav-item" data-route="speaking">口语</button>
          <button class="nav-item" data-route="parent">家长</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p id="eyebrow" class="eyebrow">今日任务</p>
            <h1 id="pageTitle">小宝今天先补听力和拼写</h1>
          </div>
          <div class="top-actions">
            <button class="icon-button" id="installButton" title="添加到主屏幕">＋</button>
            <button class="icon-button" id="soundButton" title="试播放">▶</button>
          </div>
        </header>

        <section id="view-home" class="view active"></section>
        <section id="view-english" class="view"></section>
        <section id="view-lesson" class="view"></section>
        <section id="view-practice" class="view"></section>
        <section id="view-mistakes" class="view"></section>
        <section id="view-speaking" class="view"></section>
        <section id="view-parent" class="view"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app/main.js?v=20260708-1648" type="module"></script>
  </body>
</html>
